# Use the Render-assigned port, fallback to 8080
server.port=${PORT:8080}

# -----------------------
# Database configuration
# -----------------------
# Use JDBC_DATABASE_URL provided by Render (directly compatible with Spring Boot)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------
# JPA / Hibernate settings
# -----------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
