# Use the Render-assigned port, fallback to 8080
server.port=${PORT:8080}

# -----------------------
# Database configuration
# -----------------------

# Render provides DATABASE_URL in the format: postgres://username:password@host:5432/dbname
# Spring Boot requires jdbc:postgresql://... 
# So we convert it here
spring.datasource.url=jdbc:postgresql://${DATABASE_URL#postgres://}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------
# JPA / Hibernate settings
# -----------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
